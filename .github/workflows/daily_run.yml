name: Daily Portfolio Run

on:
  schedule:
    - cron: '55 19 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install IDAES solvers (Bonmin)
        run: |
          pip install idaes-pse
          idaes get-extensions --to ~/.idaes/bin
          echo "$HOME/.idaes/bin" >> $GITHUB_PATH

      - name: Debug FMP API connection
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python3 -c "
import requests, os
key = os.environ.get('FMP_API_KEY', 'NOT SET')
print(f'Key length: {len(key)} chars')
print(f'Key starts with: {key[:8]}...')
url = f'https://financialmodelingprep.com/api/v3/historical-price-full/AAPL?from=2026-04-01&to=2026-05-01&apikey={key}'
resp = requests.get(url, timeout=15)
print(f'HTTP status: {resp.status_code}')
print(f'Response (first 500 chars): {resp.text[:500]}')
"

      - name: Run daily portfolio optimization
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python portfolio.py

      - name: Commit results back to repository
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio_state.json
          git add results/performance_log.csv
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Auto: portfolio run $(date +'%Y-%m-%d')"
          git push
