name: Daily Portfolio Run

on:
  schedule:
    - cron: '55 19 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install IDAES solvers (Bonmin)
        run: |
          pip install idaes-pse
          idaes get-extensions --to ~/.idaes/bin
          echo "$HOME/.idaes/bin" >> $GITHUB_PATH

      - name: Debug Tiingo API connection
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python debug_fmp.py

      - name: Run daily portfolio optimization
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python portfolio.py

      - name: Commit results back to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio_state.json
          git add results/performance_log.csv
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Auto: portfolio run $(date +'%Y-%m-%d')"
          git push
